<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proceso de Creación de Estructura en IVS NG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:    #D4A0A0;
    --rose-dk: #B87878;
    --gold:    #C9A84C;
    --charcoal:#2C2C2C;
    --gray:    #555555;
    --lgray:   #F7F3F3;
    --white:   #FFFFFF;
    --green:   #6B9E78;
    --red:     #C47070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--charcoal);
  }
  .header {
    background: var(--charcoal);
    padding: 20px 40px 16px;
    border-bottom: 4px solid var(--rose);
    display: flex;
    align-items: baseline;
    gap: 20px;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--white);
  }
  .header p {
    font-size: 12px;
    color: var(--rose);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 10px 40px;
    background: var(--lgray);
    border-bottom: 1px solid #E8DADA;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11.5px;
    color: var(--gray);
    font-weight: 500;
  }
  .lb { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }
  .ld { width: 14px; height: 14px; transform: rotate(45deg); flex-shrink: 0; border-radius: 2px; }
  .diagram-wrap {
    padding: 32px 40px 40px;
    overflow: auto;
  }
  svg { display: block; margin: 0 auto; }

  /* node hover */
  .np:hover rect, .nv:hover rect { filter: drop-shadow(0 3px 10px rgba(180,120,120,0.3)); cursor: pointer; }
  .nd:hover polygon { filter: drop-shadow(0 3px 10px rgba(201,168,76,0.3)); cursor: pointer; }

  /* tooltip */
  .tooltip {
    position: fixed;
    background: var(--charcoal);
    color: var(--white);
    padding: 9px 13px;
    border-radius: 7px;
    font-size: 12px;
    max-width: 240px;
    line-height: 1.5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    border-left: 3px solid var(--rose);
  }
  .tooltip.on { opacity: 1; }

  @media print {
    @page { size: A4 landscape; margin: 10mm; }
    .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .legend { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tooltip { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Proceso de Creación de Estructura de Software en IVS NG</h1>
  <p>IVS Engineering · Weldmation de México</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="lb" style="border:2px solid #B87878;background:white;"></div>Etapa del proceso</div>
  <div class="legend-item"><div class="ld" style="background:#C9A84C;"></div>Punto de decisión</div>
  <div class="legend-item"><div class="lb" style="border:2px solid #C47070;background:#FDF0F0;"></div>Corrección / Rechazo</div>
  <div class="legend-item"><div class="lb" style="border:2px solid #6B9E78;background:#F0F7F2;"></div>Resultado exitoso</div>
  <div class="legend-item"><div class="lb" style="background:#2C2C2C;border-radius:50%;"></div>Inicio / Fin</div>
</div>

<div class="diagram-wrap">
<!--
  LAYOUT (landscape A4 ~ 1060 x 720px usable)
  Left column  (x=30..510):  main process flow top→bottom
  Right column (x=560..1020): validations & corrections
  Connector arrows go right from decision nodes
-->
<svg width="1060" height="860" viewBox="0 0 1060 860">
<defs>
  <marker id="a"  markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#555"/></marker>
  <marker id="ar" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#C47070"/></marker>
  <marker id="ag" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#6B9E78"/></marker>
</defs>

<!-- ── COLUMN HEADERS ── -->
<rect x="20"  y="10" width="500" height="840" rx="8" fill="#FDFAFA" stroke="#EAD8D8" stroke-width="1"/>
<rect x="540" y="10" width="500" height="840" rx="8" fill="#F9FAFB" stroke="#D8E2EA" stroke-width="1"/>
<text x="270" y="32" font-family="DM Sans" font-size="11" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="1">FLUJO PRINCIPAL</text>
<text x="790" y="32" font-family="DM Sans" font-size="11" font-weight="600" fill="#7A9BBF" text-anchor="middle" letter-spacing="1">VALIDACIONES Y CORRECCIONES</text>

<!-- ════════════════════════════════
     LEFT COLUMN — MAIN FLOW
     y positions: 60, 120, 200, 280, 360, 440, 530, 620, 700, 780
     ════════════════════════════════ -->

<!-- INICIO -->
<g class="np" data-tip="El proceso inicia cuando D&R emite el SWAD a través de la herramienta SWCM Tool.">
  <ellipse cx="270" cy="62" rx="60" ry="24" fill="#2C2C2C"/>
  <text x="270" y="62" font-family="DM Sans" font-size="13" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="middle">INICIO</text>
</g>
<line x1="270" y1="86" x2="270" y2="108" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P1: SWAD -->
<g class="np" data-tip="El SWAD define números de parte, orden de programación (NA·1·2), OTA Capable y Signed By: IVS. Es el documento rector de todo el proceso.">
  <rect x="120" y="110" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="131" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 01</text>
  <text x="270" y="150" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Recepción del SWAD</text>
  <text x="270" y="167" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">D&amp;R → SWCM Tool → IVS Engineer</text>
</g>
<line x1="270" y1="174" x2="270" y2="196" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P2: ECU PH -->
<g class="np" data-tip="Se crea el ECU Placeholder bajo el nodo del vehículo en IVS NG. Es el contenedor raíz de toda la estructura del módulo.">
  <rect x="120" y="198" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="219" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 02</text>
  <text x="270" y="238" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Crear ECU Placeholder</text>
  <text x="270" y="255" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">Contenedor raíz del módulo</text>
</g>
<line x1="270" y1="262" x2="270" y2="284" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P3: Core Assembly -->
<g class="np" data-tip="Dentro del ECU PH se crea el Core Assembly PH con su DID de Core Assembly. Contiene la información base del hardware del módulo.">
  <rect x="120" y="286" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="307" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 03</text>
  <text x="270" y="326" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Crear Core Assembly PH</text>
  <text x="270" y="343" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">+ DID de Core Assembly</text>
</g>
<line x1="270" y1="350" x2="270" y2="372" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P4: CPU PH + DIDs -->
<g class="np" data-tip="El CPU PH contiene el software ejecutable. Dentro se crean: Secondary Bootloader PH, Boot Image PH, Recovery Image PH y Strategy PH con su archivo .vbf.">
  <rect x="120" y="374" width="300" height="74" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="395" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 04</text>
  <text x="270" y="414" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Crear CPU PH + DIDs</text>
  <text x="270" y="431" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">Sec. Bootloader · Boot Image · Recovery · Strategy (.vbf)</text>
</g>
<line x1="270" y1="448" x2="270" y2="468" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P5: Part II -->
<g class="np" data-tip="El Part II es obligatorio en todos los módulos sin excepción. Es un archivo .mdx con información complementaria de identificación del software.">
  <rect x="120" y="470" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="491" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 05</text>
  <text x="270" y="510" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Cargar Part II (.mdx)</text>
  <text x="270" y="527" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">Obligatorio en todos los módulos</text>
</g>
<line x1="270" y1="534" x2="270" y2="556" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P6: BOM Management -->
<g class="np" data-tip="En BOM Management se asignan los DIDs al Assembly: Core Assembly, Strategy, Base Config (si aplica), Calibration (si aplica) y Part II.">
  <rect x="120" y="558" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="579" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 06</text>
  <text x="270" y="598" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">BOM Management</text>
  <text x="270" y="615" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">Asignar DIDs al Assembly</text>
</g>
<line x1="270" y1="622" x2="270" y2="644" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- FREEZE -->
<g class="np" data-tip="El freeze publica y bloquea la estructura. Todos los DIDs quedan marcados con (frz) y el software queda disponible para dealers y actualizaciones OTA.">
  <rect x="100" y="646" width="340" height="74" rx="7" fill="#FDF5F5" stroke="#D4A0A0" stroke-width="3"/>
  <text x="270" y="667" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 07</text>
  <text x="270" y="688" font-family="DM Sans" font-size="15" font-weight="600" fill="#B87878" text-anchor="middle">Ejecutar Freeze</text>
  <text x="270" y="707" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">Estructura publicada · DIDs marcados (frz)</text>
</g>
<line x1="270" y1="720" x2="270" y2="742" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- FIN -->
<g class="np" data-tip="Proceso completado. La estructura queda registrada con historial de versionado, fecha de freeze e IVS Engineer responsable.">
  <rect x="120" y="744" width="300" height="54" rx="7" fill="#F0F7F2" stroke="#6B9E78" stroke-width="2"/>
  <text x="270" y="765" font-family="DM Sans" font-size="10" font-weight="600" fill="#6B9E78" text-anchor="middle" letter-spacing="0.5">RESULTADO</text>
  <text x="270" y="784" font-family="DM Sans" font-size="13" font-weight="600" fill="#4A7A57" text-anchor="middle">Software disponible · Red global de dealers</text>
</g>

<!-- ════════════════════════════════
     RIGHT COLUMN — VALIDATIONS
     ════════════════════════════════ -->

<!-- ── DECISION 1: Entregables completos? (links from P1 area) ── -->
<!-- arrow from SWAD right side -->
<line x1="420" y1="142" x2="538" y2="142" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="479" y="135" font-family="DM Sans" font-size="10" font-weight="600" fill="#C9A84C" text-anchor="middle">Validar</text>

<g class="nd" data-tip="Se verifica que el proveedor entregó los 5 obligatorios: Concern en WERS, SW Files (.vbf), DID Reports, Release Notes y Part II (.mdx).">
  <polygon points="700,110 820,148 700,186 580,148" fill="white" stroke="#C9A84C" stroke-width="2"/>
  <text x="700" y="140" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">¿Entregables</text>
  <text x="700" y="158" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">completos?</text>
</g>

<!-- Sí → back to flow (down-left) -->
<line x1="700" y1="186" x2="700" y2="210" stroke="#6B9E78" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="715" y="202" font-family="DM Sans" font-size="11" font-weight="600" fill="#6B9E78">Sí ↓</text>
<g>
  <rect x="600" y="212" width="200" height="40" rx="6" fill="#F0F7F2" stroke="#6B9E78" stroke-width="1.5"/>
  <text x="700" y="236" font-family="DM Sans" font-size="11" font-weight="500" fill="#4A7A57" text-anchor="middle">Continuar proceso ✓</text>
</g>

<!-- No → reject -->
<line x1="820" y1="148" x2="890" y2="148" stroke="#C47070" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
<text x="853" y="140" font-family="DM Sans" font-size="10" font-weight="600" fill="#C47070" text-anchor="middle">No</text>
<g class="nv" data-tip="El paquete se rechaza. Se notifica al proveedor con observaciones específicas y se registra en JIRA. El proceso se detiene hasta recibir el paquete corregido.">
  <rect x="892" y="118" width="148" height="60" rx="6" fill="#FDF0F0" stroke="#C47070" stroke-width="2"/>
  <text x="966" y="140" font-family="DM Sans" font-size="12" font-weight="600" fill="#C47070" text-anchor="middle">Rechazo al</text>
  <text x="966" y="158" font-family="DM Sans" font-size="12" font-weight="600" fill="#C47070" text-anchor="middle">proveedor</text>
  <text x="966" y="172" font-family="DM Sans" font-size="10" fill="#555" text-anchor="middle">Notificación + JIRA</text>
</g>

<!-- ── DECISION 2: Base Config? (links from P4 area) ── -->
<line x1="420" y1="411" x2="538" y2="411" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="479" y="403" font-family="DM Sans" font-size="10" font-weight="600" fill="#C9A84C" text-anchor="middle">Verificar</text>

<g class="nd" data-tip="El SWAD indica si el módulo requiere Base Configuration PH y/o Calibration PH dentro del Strategy PH. Son opcionales según el módulo.">
  <polygon points="700,375 820,411 700,447 580,411" fill="white" stroke="#C9A84C" stroke-width="2"/>
  <text x="700" y="403" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">¿Requiere Base</text>
  <text x="700" y="421" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">Config / Calibration?</text>
</g>

<!-- Sí -->
<line x1="700" y1="447" x2="700" y2="468" stroke="#6B9E78" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="715" y="462" font-family="DM Sans" font-size="11" font-weight="600" fill="#6B9E78">Sí ↓</text>
<g class="nv" data-tip="Se crean Base Configuration PH y/o Calibration PH dentro del Strategy PH con sus respectivos DIDs según el SWAD.">
  <rect x="590" y="470" width="220" height="50" rx="6" fill="white" stroke="#B87878" stroke-width="1.5"/>
  <text x="700" y="490" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">Crear Base Config PH</text>
  <text x="700" y="508" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">y/o Calibration PH</text>
</g>

<!-- No -->
<line x1="820" y1="411" x2="890" y2="411" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="853" y="403" font-family="DM Sans" font-size="11" font-weight="600" fill="#555">No</text>
<g>
  <rect x="892" y="385" width="148" height="52" rx="6" fill="#F7F3F3" stroke="#DDCCCC" stroke-width="1.5"/>
  <text x="966" y="406" font-family="DM Sans" font-size="11" font-weight="500" fill="#777" text-anchor="middle">No aplica</text>
  <text x="966" y="424" font-family="DM Sans" font-size="10" fill="#999" text-anchor="middle">Continuar sin ellos</text>
</g>

<!-- ── DECISION 3: Pre-freeze OK? (links from BOM area) ── -->
<line x1="420" y1="590" x2="538" y2="590" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="479" y="582" font-family="DM Sans" font-size="10" font-weight="600" fill="#C9A84C" text-anchor="middle">Validar</text>

<g class="nd" data-tip="Verificación final: DIDs obligatorios presentes, Part II cargado (.mdx), OTA Capable según SWAD y campo Signed By: IVS confirmado.">
  <polygon points="700,554 820,590 700,626 580,590" fill="white" stroke="#C9A84C" stroke-width="2"/>
  <text x="700" y="582" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">¿Validación</text>
  <text x="700" y="600" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">pre-freeze OK?</text>
</g>

<!-- Sí → freeze -->
<line x1="700" y1="626" x2="700" y2="648" stroke="#6B9E78" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="715" y="641" font-family="DM Sans" font-size="11" font-weight="600" fill="#6B9E78">Sí ↓</text>
<g>
  <rect x="590" y="650" width="220" height="40" rx="6" fill="#F0F7F2" stroke="#6B9E78" stroke-width="1.5"/>
  <text x="700" y="674" font-family="DM Sans" font-size="11" font-weight="500" fill="#4A7A57" text-anchor="middle">Proceder al freeze ✓</text>
</g>

<!-- No → correct -->
<line x1="820" y1="590" x2="890" y2="590" stroke="#C47070" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
<text x="853" y="582" font-family="DM Sans" font-size="10" font-weight="600" fill="#C47070" text-anchor="middle">No</text>
<g class="nv" data-tip="Se identifican los DIDs faltantes o mal configurados y se corrige la estructura antes de proceder al freeze. Se revisa contra el SWAD.">
  <rect x="892" y="560" width="148" height="60" rx="6" fill="#FDF0F0" stroke="#C47070" stroke-width="2"/>
  <text x="966" y="582" font-family="DM Sans" font-size="12" font-weight="600" fill="#C47070" text-anchor="middle">Corregir</text>
  <text x="966" y="600" font-family="DM Sans" font-size="12" font-weight="600" fill="#C47070" text-anchor="middle">estructura</text>
  <text x="966" y="614" font-family="DM Sans" font-size="10" fill="#555" text-anchor="middle">Revisar SWAD</text>
</g>

<!-- ── NOTE ── -->
<rect x="548" y="720" width="492" height="110" rx="7" fill="#F7F3F3" stroke="#E8DADA" stroke-width="1"/>
<text x="794" y="744" font-family="DM Sans" font-size="11" font-weight="600" fill="#B87878" text-anchor="middle">Notas importantes</text>
<text x="794" y="764" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">· El campo Signed By: IVS confirma que la responsabilidad de validación</text>
<text x="794" y="780" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">  y publicación recae sobre el área de IVS Engineering.</text>
<text x="794" y="798" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">· Si OTA Capable está activo, el software publicado puede distribuirse</text>
<text x="794" y="814" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">  remotamente a miles de vehículos de forma simultánea.</text>

</svg>
</div>

<div class="tooltip" id="tt"></div>
<script>
  const tt = document.getElementById('tt');
  document.querySelectorAll('[data-tip]').forEach(n => {
    n.style.cursor = 'pointer';
    n.addEventListener('mouseenter', () => { tt.textContent = n.dataset.tip; tt.classList.add('on'); });
    n.addEventListener('mousemove', e => {
      let x = e.clientX + 14, y = e.clientY + 14;
      if (x + 250 > window.innerWidth) x = e.clientX - 260;
      if (y + 80 > window.innerHeight) y = e.clientY - 80;
      tt.style.left = x + 'px'; tt.style.top = y + 'px';
    });
    n.addEventListener('mouseleave', () => tt.classList.remove('on'));
  });
</script>
</body>
</html>
