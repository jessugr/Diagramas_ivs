<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proceso de Resolución de Tickets de Incidencias</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:    #D4A0A0;
    --rose-dk: #B87878;
    --gold:    #C9A84C;
    --charcoal:#2C2C2C;
    --gray:    #555555;
    --lgray:   #F7F3F3;
    --white:   #FFFFFF;
    --green:   #6B9E78;
    --red:     #C47070;
    --blue:    #7A9BBF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--charcoal); }

  .header {
    background: var(--charcoal);
    padding: 20px 40px 16px;
    border-bottom: 4px solid var(--rose);
    display: flex; align-items: baseline; gap: 20px;
  }
  .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--white); }
  .header p  { font-size: 12px; color: var(--rose); letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 20px;
    padding: 10px 40px; background: var(--lgray);
    border-bottom: 1px solid #E8DADA; align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--gray); font-weight: 500; }
  .lb { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }
  .ld { width: 14px; height: 14px; transform: rotate(45deg); flex-shrink: 0; border-radius: 2px; }

  .diagram-wrap { padding: 32px 40px 40px; overflow: auto; }
  svg { display: block; margin: 0 auto; }

  .np:hover rect   { filter: drop-shadow(0 3px 10px rgba(180,120,120,0.3)); cursor: pointer; }
  .nv:hover rect   { filter: drop-shadow(0 3px 10px rgba(122,155,191,0.3)); cursor: pointer; }
  .nr:hover rect   { filter: drop-shadow(0 3px 10px rgba(196,112,112,0.3)); cursor: pointer; }
  .nd:hover polygon{ filter: drop-shadow(0 3px 10px rgba(201,168,76,0.3));  cursor: pointer; }
  .ns:hover ellipse{ filter: drop-shadow(0 3px 10px rgba(107,158,120,0.3)); cursor: pointer; }

  .tooltip {
    position: fixed; background: var(--charcoal); color: var(--white);
    padding: 9px 13px; border-radius: 7px; font-size: 12px;
    max-width: 240px; line-height: 1.5; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; z-index: 100;
    border-left: 3px solid var(--rose);
  }
  .tooltip.on { opacity: 1; }

  @media print {
    @page { size: A4 landscape; margin: 10mm; }
    .header, .legend { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tooltip { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Proceso de Resolución de Tickets de Incidencias</h1>
  <p>IVS Engineering · Weldmation de México</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="lb" style="border:2px solid #B87878;background:white;"></div>Etapa del proceso</div>
  <div class="legend-item"><div class="lb" style="border:2px solid #7A9BBF;background:#F0F5FA;"></div>Origen del ticket</div>
  <div class="legend-item"><div class="ld" style="background:#C9A84C;"></div>Punto de decisión</div>
  <div class="legend-item"><div class="lb" style="border:2px solid #C47070;background:#FDF0F0;"></div>Escalación / Corrección</div>
  <div class="legend-item"><div class="lb" style="border:2px solid #6B9E78;background:#F0F7F2;"></div>Resultado exitoso</div>
</div>

<div class="diagram-wrap">
<svg width="1060" height="900" viewBox="0 0 1060 900">
<defs>
  <marker id="a"  markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#555"/></marker>
  <marker id="ar" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#C47070"/></marker>
  <marker id="ag" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#6B9E78"/></marker>
  <marker id="ab" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#7A9BBF"/></marker>
</defs>

<!-- ── COLUMN BACKGROUNDS ── -->
<rect x="20"  y="10" width="500" height="880" rx="8" fill="#FDFAFA" stroke="#EAD8D8" stroke-width="1"/>
<rect x="540" y="10" width="500" height="880" rx="8" fill="#F9FAFB" stroke="#D8E2EA" stroke-width="1"/>
<text x="270" y="32" font-family="DM Sans" font-size="11" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="1">FLUJO PRINCIPAL</text>
<text x="790" y="32" font-family="DM Sans" font-size="11" font-weight="600" fill="#7A9BBF" text-anchor="middle" letter-spacing="1">DECISIONES Y ESCALACIONES</text>

<!-- ── CONCERN BADGE ── -->
<rect x="28" y="430" width="484" height="70" rx="6" fill="none" stroke="#C47070" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="48" y="448" font-family="DM Sans" font-size="10" font-weight="600" fill="#C47070" letter-spacing="0.5">⚠ CONCERN — TIEMPO MÁXIMO DE RESOLUCIÓN: 48 HORAS</text>

<!-- ════════════════════════════════
     LEFT — MAIN FLOW
     ════════════════════════════════ -->

<!-- INICIO -->
<ellipse cx="270" cy="62" rx="60" ry="24" fill="#2C2C2C"/>
<text x="270" y="62" font-family="DM Sans" font-size="13" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="middle">INICIO</text>
<line x1="270" y1="86" x2="270" y2="108" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- ORIGEN: 3 fuentes -->
<rect x="80" y="110" width="380" height="30" rx="6" fill="#F0F5FA" stroke="#7A9BBF" stroke-width="1.5"/>
<text x="270" y="129" font-family="DM Sans" font-size="11" font-weight="600" fill="#7A9BBF" text-anchor="middle" letter-spacing="0.5">ORIGEN DEL TICKET</text>

<!-- 3 source boxes -->
<g class="nv" data-tip="Falla detectada durante el proceso de EOL (End of Line) en la línea de ensamble. El vehículo aún está en planta.">
  <rect x="32"  y="150" width="148" height="54" rx="6" fill="#F0F5FA" stroke="#7A9BBF" stroke-width="1.5"/>
  <text x="106" y="170" font-family="DM Sans" font-size="11" font-weight="600" fill="#7A9BBF" text-anchor="middle">Spotcheck</text>
  <text x="106" y="186" font-family="DM Sans" font-size="10" fill="#555" text-anchor="middle">Falla en EOL</text>
  <text x="106" y="199" font-family="DM Sans" font-size="10" fill="#555" text-anchor="middle">(línea de producción)</text>
</g>
<g class="nv" data-tip="Incidencia en vehículo con propietario o listo para entrega al cliente. Tiempo máximo de resolución: 48 horas.">
  <rect x="196" y="150" width="148" height="54" rx="6" fill="#FDF5F0" stroke="#C47070" stroke-width="1.5"/>
  <text x="270" y="170" font-family="DM Sans" font-size="11" font-weight="600" fill="#C47070" text-anchor="middle">Concern</text>
  <text x="270" y="186" font-family="DM Sans" font-size="10" fill="#555" text-anchor="middle">Vehículo con propietario</text>
  <text x="270" y="199" font-family="DM Sans" font-size="10" fill="#C47070" text-anchor="middle">⚠ Máx. 48 horas</text>
</g>
<g class="nv" data-tip="Error detectado internamente en la estructura de IVS NG durante el proceso de validación o mantenimiento.">
  <rect x="360" y="150" width="148" height="54" rx="6" fill="#F0F5FA" stroke="#7A9BBF" stroke-width="1.5"/>
  <text x="434" y="170" font-family="DM Sans" font-size="11" font-weight="600" fill="#7A9BBF" text-anchor="middle">Error interno</text>
  <text x="434" y="186" font-family="DM Sans" font-size="10" fill="#555" text-anchor="middle">Estructura IVS</text>
  <text x="434" y="199" font-family="DM Sans" font-size="10" fill="#555" text-anchor="middle">detectado internamente</text>
</g>

<!-- arrows from 3 sources to P1 -->
<line x1="106" y1="204" x2="200" y2="234" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="270" y1="204" x2="270" y2="234" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="434" y1="204" x2="340" y2="234" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

<!-- P1: Recepción y registro -->
<g class="np" data-tip="El ticket se recibe y registra en JIRA con: módulo afectado, tipo (Spotcheck o Concern), descripción del problema y fecha de inicio del cronómetro en Concerns.">
  <rect x="120" y="236" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="257" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 01</text>
  <text x="270" y="276" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Recepción y registro</text>
  <text x="270" y="293" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">del ticket en JIRA</text>
</g>
<line x1="270" y1="300" x2="270" y2="322" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P2: Análisis módulo -->
<g class="np" data-tip="Se revisa la estructura activa del módulo afectado en IVS NG: versiones de DIDs, jerarquía de Placeholders, asignaciones en BOM Management y compatibilidad CAN Bus.">
  <rect x="120" y="324" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="345" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 02</text>
  <text x="270" y="364" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Análisis del módulo afectado</text>
  <text x="270" y="381" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">Revisión de estructura en IVS NG</text>
</g>
<line x1="270" y1="388" x2="270" y2="410" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P3: Documentación causa raíz -->
<g class="np" data-tip="Se identifica y documenta la causa raíz: DID mal configurado, versión incompatible entre módulos CAN Bus, entregable no conforme del proveedor u otro origen.">
  <rect x="120" y="412" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="433" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 03</text>
  <text x="270" y="452" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Documentación de causa raíz</text>
  <text x="270" y="469" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">en JIRA</text>
</g>
<line x1="270" y1="476" x2="270" y2="498" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P4: Corrección en IVS -->
<g class="np" data-tip="Se aplica la corrección directamente en IVS NG: se modifican los DIDs incorrectos, se actualizan asignaciones en BOM Management o se reemplaza el archivo de software.">
  <rect x="120" y="500" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="521" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 04</text>
  <text x="270" y="540" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Corrección en IVS NG</text>
  <text x="270" y="557" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">Modificación de estructura o DIDs</text>
</g>
<line x1="270" y1="564" x2="270" y2="586" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P5: Validación -->
<g class="np" data-tip="Se valida que la corrección aplicada resuelve el problema: se verifica la estructura en IVS NG y se confirma que el dealer puede instalar el software corregido en el vehículo.">
  <rect x="120" y="588" width="300" height="64" rx="7" fill="white" stroke="#B87878" stroke-width="2"/>
  <text x="270" y="609" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 05</text>
  <text x="270" y="628" font-family="DM Sans" font-size="13" font-weight="600" fill="#2C2C2C" text-anchor="middle">Validación de la corrección</text>
  <text x="270" y="645" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">Confirmación con dealer</text>
</g>
<line x1="270" y1="652" x2="270" y2="674" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- P6: Cierre -->
<g class="np" data-tip="Se documenta la solución completa en JIRA y se cierra el ticket. La solución queda registrada en Confluence como base de conocimiento para incidencias futuras.">
  <rect x="120" y="676" width="300" height="64" rx="7" fill="#FDF5F5" stroke="#D4A0A0" stroke-width="3"/>
  <text x="270" y="697" font-family="DM Sans" font-size="10" font-weight="600" fill="#B87878" text-anchor="middle" letter-spacing="0.5">PASO 06</text>
  <text x="270" y="716" font-family="DM Sans" font-size="13" font-weight="600" fill="#B87878" text-anchor="middle">Cierre y documentación final</text>
  <text x="270" y="733" font-family="DM Sans" font-size="11" fill="#555" text-anchor="middle">JIRA + Confluence</text>
</g>
<line x1="270" y1="740" x2="270" y2="762" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

<!-- FIN -->
<g>
  <rect x="120" y="764" width="300" height="54" rx="7" fill="#F0F7F2" stroke="#6B9E78" stroke-width="2"/>
  <text x="270" y="785" font-family="DM Sans" font-size="10" font-weight="600" fill="#6B9E78" text-anchor="middle" letter-spacing="0.5">RESULTADO</text>
  <text x="270" y="804" font-family="DM Sans" font-size="12" font-weight="600" fill="#4A7A57" text-anchor="middle">Incidencia resuelta · Software operando ✓</text>
</g>

<!-- ════════════════════════════════
     RIGHT — DECISIONS
     ════════════════════════════════ -->

<!-- ── DECISION 1: Se identifica causa raíz? (from P2) ── -->
<line x1="420" y1="356" x2="538" y2="356" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="479" y="348" font-family="DM Sans" font-size="10" font-weight="600" fill="#C9A84C" text-anchor="middle">Evaluar</text>

<g class="nd" data-tip="Si el IVS Engineer no puede identificar la causa raíz por sí solo, escala al equipo técnico senior o al proveedor para análisis conjunto.">

  <text x="700" y="348" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">¿Se identifica</text>
  <text x="700" y="366" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">la causa raíz?</text>
</g>

<!-- Sí -->
<line x1="700" y1="392" x2="700" y2="412" stroke="#6B9E78" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="716" y="406" font-family="DM Sans" font-size="11" font-weight="600" fill="#6B9E78">Sí ↓</text>
<rect x="600" y="414" width="200" height="36" rx="6" fill="#F0F7F2" stroke="#6B9E78" stroke-width="1.5"/>
<text x="700" y="436" font-family="DM Sans" font-size="11" font-weight="500" fill="#4A7A57" text-anchor="middle">Documentar y continuar ✓</text>

<!-- No → escalación -->
<line x1="820" y1="356" x2="892" y2="356" stroke="#C47070" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
<text x="854" y="348" font-family="DM Sans" font-size="10" font-weight="600" fill="#C47070" text-anchor="middle">No</text>
<g class="nr" data-tip="Se escala al equipo técnico senior o al proveedor para análisis conjunto. En Concerns la escalación debe ser inmediata para no perder tiempo dentro de las 48 horas.">
  <rect x="894" y="326" width="146" height="60" rx="6" fill="#FDF0F0" stroke="#C47070" stroke-width="2"/>
  <text x="967" y="348" font-family="DM Sans" font-size="12" font-weight="600" fill="#C47070" text-anchor="middle">Escalación al</text>
  <text x="967" y="366" font-family="DM Sans" font-size="12" font-weight="600" fill="#C47070" text-anchor="middle">equipo técnico</text>
  <text x="967" y="381" font-family="DM Sans" font-size="10" fill="#555" text-anchor="middle">o proveedor</text>
</g>

<text x="750" y="272" font-family="DM Sans" font-size="10" font-weight="600" fill="#C47070" text-anchor="middle">Reanálisis con soporte</text>

<!-- ── DECISION 2: Requiere corrección en IVS? (from P3) ── -->
<line x1="420" y1="532" x2="538" y2="532" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="479" y="524" font-family="DM Sans" font-size="10" font-weight="600" fill="#C9A84C" text-anchor="middle">Evaluar</text>

<g class="nd" data-tip="Si la causa raíz es un error del proveedor (archivo .vbf incorrecto, checksum inválido) se notifica al proveedor para que reenvíe el entregable corregido.">

  <text x="700" y="524" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">¿Requiere corrección</text>

<!-- Proveedor -->
<line x1="820" y1="532" x2="892" y2="532" stroke="#C47070" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
<text x="854" y="522" font-family="DM Sans" font-size="10" font-weight="600" fill="#C47070" text-anchor="middle">Proveedor</text>
<g class="nr" data-tip="Si el error es del proveedor se le notifica formalmente y se solicita el entregable corregido. Se registra en JIRA y se espera el reenvío.">

  <text x="967" y="524" font-family="DM Sans" font-size="12" font-weight="600" fill="#C47070" text-anchor="middle">Notificación al</text>
  <text x="967" y="542" font-family="DM Sans" font-size="12" font-weight="600" fill="#C47070" text-anchor="middle">proveedor</text>
  <text x="967" y="556" font-family="DM Sans" font-size="10" fill="#555" text-anchor="middle">Solicitar reenvío</text>
</g>

<!-- ── DECISION 3: Dealer puede instalar? (from P5) ── -->
<line x1="420" y1="620" x2="538" y2="620" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="479" y="612" font-family="DM Sans" font-size="10" font-weight="600" fill="#C9A84C" text-anchor="middle">Confirmar</text>

<g class="nd" data-tip="Se verifica con el dealer que puede instalar el software corregido en el vehículo. Si hay problemas de instalación se realiza una revisión adicional de la estructura.">
  <polygon points="700,584 820,620 700,656 580,620" fill="white" stroke="#C9A84C" stroke-width="2"/>
  <text x="700" y="612" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">¿Dealer puede</text>
  <text x="700" y="630" font-family="DM Sans" font-size="12" font-weight="600" fill="#2C2C2C" text-anchor="middle">instalar el SW?</text>
</g>

<!-- Sí -->
<line x1="700" y1="656" x2="700" y2="676" stroke="#6B9E78" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="716" y="670" font-family="DM Sans" font-size="11" font-weight="600" fill="#6B9E78">Sí ↓</text>
<rect x="600" y="678" width="200" height="36" rx="6" fill="#F0F7F2" stroke="#6B9E78" stroke-width="1.5"/>
<text x="700" y="700" font-family="DM Sans" font-size="11" font-weight="500" fill="#4A7A57" text-anchor="middle">Proceder al cierre ✓</text>

<!-- No → revisión adicional -->
<line x1="820" y1="620" x2="892" y2="620" stroke="#C47070" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
<text x="854" y="612" font-family="DM Sans" font-size="10" font-weight="600" fill="#C47070" text-anchor="middle">No</text>
<g class="nr" data-tip="Si el dealer reporta problemas para instalar el software se realiza una revisión adicional de la estructura en IVS NG, verificando orden de programación y compatibilidad.">

<div class="tooltip" id="tt"></div>
<script>
  const tt = document.getElementById('tt');
  document.querySelectorAll('[data-tip]').forEach(n => {
    n.style.cursor = 'pointer';
    n.addEventListener('mouseenter', () => { tt.textContent = n.dataset.tip; tt.classList.add('on'); });
    n.addEventListener('mousemove', e => {
      let x = e.clientX + 14, y = e.clientY + 14;
      if (x + 250 > window.innerWidth) x = e.clientX - 260;
      if (y + 80 > window.innerHeight) y = e.clientY - 80;
      tt.style.left = x + 'px'; tt.style.top = y + 'px';
    });
    n.addEventListener('mouseleave', () => tt.classList.remove('on'));
  });
</script>
